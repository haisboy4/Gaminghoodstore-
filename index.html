<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming hood Store</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    margin: 0;
    padding: 10px;
  }

  /* 🔍 Search bar */
  .search-bar {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    justify-content: center;
    padding: 10px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    margin-bottom: 10px;
  }

  .search-bar input {
    width: 70%;
    padding: 10px;
    border: none;
    border-radius: 25px 0 0 25px;
  }

  .search-bar button {
    background: #2196F3;
    border: none;
    color: white;
    padding: 10px 15px;
    border-radius: 0 25px 25px 0;
    cursor: pointer;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 15px;
  }

  .card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .card img {
    width: 100%;
    height: 140px;
    object-fit: cover;
  }

  .info { padding: 10px; }

  .btn {
    background: #2196F3;
    color: white;
    text-align: center;
    padding: 8px;
    text-decoration: none;
  }

  /* ✨ Status UI */
  .status-box {
    text-align: center;
    padding: 20px;
    margin-top: 30px;
  }

  .retry-btn {
    background: #ff5252;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 10px;
  }

  .loader {
    border: 4px solid #eee;
    border-top: 4px solid #2196F3;
    border-radius: 50%;
    width: 35px;
    height: 35px;
    margin: auto;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    100% { transform: rotate(360deg); }
  }

  #backToTop {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: none;
    padding: 10px;
    border-radius: 50%;
    background: #2196F3;
    color: white;
    border: none;
    cursor: pointer;
  }
</style>
</head>

<body>

<div class="search-bar">
  <input type="text" id="searchInput" placeholder="Search games...">
  <button id="searchBtn">🔍</button>
</div>

<div id="status"></div>
<div id="grid" class="grid"></div>

<button id="backToTop">⬆️</button>

<script>
const sheetUrl = "https://docs.google.com/spreadsheets/d/1ibhg4uYopbqS7n_wFgITtRVe8IJGJnQbRfQpCdd55uE/export?format=csv";

let allGames = [];
let retryCount = 0;
const maxRetries = 3;

/* 🔄 Fetch with retry system */
function loadData() {
  showLoading();

  fetch(sheetUrl)
    .then(res => {
      if (!res.ok) throw new Error("Network error");
      return res.text();
    })
    .then(csv => {
      retryCount = 0;
      parseData(csv);
      showGrid();
    })
    .catch(err => {
      retryCount++;

      if (retryCount <= maxRetries) {
        showStatus(`Retrying... (${retryCount}/${maxRetries})`);
        setTimeout(loadData, 1500);
      } else {
        showError();
      }
    });
}

/* 📊 Parse CSV */
function parseData(csv) {
  const rows = csv.trim().split("\n").slice(1);
  allGames = rows.map(row => {
    const [name, Platform, image, link] = row.split(",");
    return { name, Platform, image, link };
  });
  displayGames(allGames);
}

/* 🎮 Display */
function displayGames(games) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  games.forEach(game => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${game.image}">
      <div class="info">
        <h3>${game.name}</h3>
        <p>${game.Platform}</p>
      </div>
      <a class="btn" href="${game.link}" target="_blank">Download</a>
    `;

    grid.appendChild(card);
  });
}

/* 🔍 Search */
function searchGames() {
  const q = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allGames.filter(g =>
    g.name.toLowerCase().includes(q) ||
    g.Platform.toLowerCase().includes(q)
  );
  displayGames(filtered);
}

document.getElementById("searchBtn").onclick = searchGames;
document.getElementById("searchInput").oninput = searchGames;

/* 🎯 UI States */
function showLoading() {
  document.getElementById("status").innerHTML = `
    <div class="status-box">
      <div class="loader"></div>
      <p>Loading games...</p>
    </div>
  `;
}

function showStatus(msg) {
  document.getElementById("status").innerHTML = `
    <div class="status-box">
      <p>${msg}</p>
    </div>
  `;
}

function showError() {
  document.getElementById("status").innerHTML = `
    <div class="status-box">
      <p>⚠️ Failed to load data</p>
      <button class="retry-btn" onclick="retryLoad()">Retry</button>
    </div>
  `;
}

function showGrid() {
  document.getElementById("status").innerHTML = "";
}

function retryLoad() {
  retryCount = 0;
  loadData();
}

/* ⬆️ Back to Top */
window.onscroll = () => {
  document.getElementById("backToTop").style.display =
    window.scrollY > 300 ? "block" : "none";
};

document.getElementById("backToTop").onclick = () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
};

/* 🚀 Start */
loadData();
</script>

</body>
</html>
